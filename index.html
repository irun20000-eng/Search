<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Search — 주제 리서치 갤러리</title>
<meta name="description" content="주제 입력 → 국내+해외 출처 기반 무환각 리서치 보고서. 옵시디언 볼트와 동일 .md." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
  :root{
    --bg:#FFF8F0; --card:#FFFFFF; --line:#EFE6DA; --line2:#F1E9DD;
    --ink:#2B2622; --muted:#8A7E72; --accent:#E8743B; --accent-soft:#FCEDE1;
    --quick-bg:#E8F1E5; --quick-ink:#48803F; --deep-bg:#FBE6D8; --deep-ink:#C2582B;
    --chip:#F7F1E8;
    --round:1px; --maxw:1080px;
    --shadow:0 6px 22px rgba(120,90,60,.08);
    --font:"Nunito","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.62;-webkit-font-smoothing:antialiased}
  header.hero{max-width:var(--maxw);margin:0 auto;padding:40px 22px 8px}
  .hero h1{font-size:1.85rem;font-weight:800;margin:0 0 8px;letter-spacing:-.01em}
  .hero .sub{color:var(--muted);font-size:1rem;margin:0;max-width:760px}
  .hero .badge{display:inline-block;font-size:.76rem;font-weight:600;color:var(--muted);background:var(--chip);border-radius:999px;padding:4px 12px;margin-top:12px}
  .controls{max-width:var(--maxw);margin:22px auto 6px;padding:0 22px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .controls input[type=search]{flex:1 1 220px;min-width:160px;background:var(--card);border:1.5px solid var(--line);color:var(--ink);border-radius:14px;padding:12px 16px;font-size:.98rem;font-family:var(--font);outline:none}
  .controls input[type=search]::placeholder{color:#b6a899}
  .controls input[type=search]:focus{border-color:var(--accent)}
  .controls select{background:var(--card);border:1.5px solid var(--line);color:var(--ink);border-radius:14px;padding:12px 14px;font-size:.92rem;font-family:var(--font);cursor:pointer}
  #tagbar{max-width:var(--maxw);margin:8px auto 0;padding:0 22px;display:flex;gap:8px;flex-wrap:wrap}
  .tag{font-size:.8rem;font-weight:600;color:var(--muted);background:var(--chip);border:1.5px solid transparent;border-radius:999px;padding:5px 12px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:.12s}
  .tag.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  main{max-width:var(--maxw);margin:0 auto;padding:20px 22px 90px}
  .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:20px 20px 18px;cursor:pointer;transition:transform .14s ease,box-shadow .14s ease,border-color .14s;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow)}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 12px 30px rgba(120,90,60,.14)}
  /* topic color strip (rhythm) — stronger */
  .card{border-top:6px solid var(--strip,var(--line))}
  .card{background:color-mix(in srgb, var(--strip) 6%, var(--card))}
  .card:hover{box-shadow:0 14px 34px rgba(120,90,60,.18)}
  .foot .t.lead{color:var(--strip);border:1.5px solid var(--strip);background:#fff;font-weight:700}
  .pill-feat{font-weight:800;border-radius:8px;padding:3px 11px;font-size:.72rem;background:var(--accent);color:#fff;letter-spacing:.04em}
  /* featured hero — stronger */
  .card.featured{grid-column:1/-1;flex-direction:row;align-items:stretch;gap:0;padding:0;overflow:hidden;border-top:9px solid var(--strip);background:linear-gradient(115deg, color-mix(in srgb, var(--strip) 22%, #fff), #fff 66%);box-shadow:0 16px 42px rgba(120,90,60,.18)}
  .card.featured .cover{flex:0 0 300px;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(255,255,255,.45)}
  .card.featured .cover img{width:100%;border-radius:12px;border:1.5px solid var(--line);box-shadow:0 8px 22px rgba(120,90,60,.16)}
  .card.featured .body{flex:1;display:flex;flex-direction:column;gap:12px;padding:26px 30px}
  .card.featured h2{font-size:1.7rem;line-height:1.28}
  .card.featured .tldr{font-size:1rem;-webkit-line-clamp:3}
  @media(max-width:700px){.card.featured{flex-direction:column}.card.featured .cover{flex-basis:auto;padding:18px 18px 0}}
  .card .meta{display:flex;gap:8px;align-items:center;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
  .depth{font-weight:700;border-radius:8px;padding:2px 10px;font-size:.74rem;letter-spacing:.02em}
  .depth.quick{background:var(--quick-bg);color:var(--quick-ink)}
  .depth.deep{background:var(--deep-bg);color:var(--deep-ink)}
  .card h2{font-size:1.16rem;font-weight:700;margin:0;letter-spacing:-.01em;line-height:1.38}
  .card .tldr{color:var(--muted);font-size:.92rem;margin:0;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .card .foot{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:4px}
  .card .foot .t{font-size:.74rem;font-weight:600;color:var(--muted);background:var(--chip);border-radius:999px;padding:3px 10px}
  .src{font-size:.74rem;color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:60px 0}
  .overlay{position:fixed;inset:0;background:rgba(60,45,30,.34);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);display:none;z-index:40}
  .overlay.open{display:block}
  .sheet{position:fixed;inset:0;margin:auto;max-width:880px;width:100%;height:100%;background:var(--bg);overflow-y:auto;z-index:41;display:none}
  .sheet.open{display:block}
  .sheet .bar{position:sticky;top:0;background:rgba(255,248,240,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1.5px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:13px 20px;z-index:2}
  .sheet .bar a{color:var(--accent);text-decoration:none;font-size:.86rem;font-weight:600}
  .sheet .close{background:var(--card);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 15px;cursor:pointer;font-size:.9rem;font-family:var(--font);font-weight:600}
  .article{padding:10px 24px 90px;max-width:760px;margin:0 auto}
  .article img{max-width:520px;width:100%;border-radius:14px;border:1.5px solid var(--line);display:block;margin:16px auto;cursor:zoom-in}
  .article img.zoom{max-width:100%}
  .article h1{font-size:1.8rem;font-weight:800;letter-spacing:-.01em}
  .article h2{margin-top:1.9em;padding-bottom:.3em;border-bottom:1.5px solid var(--line);font-weight:700}
  .article a{color:var(--accent);word-break:break-all}
  .article code{background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:.1em .4em;font-size:.88em;font-family:"SFMono-Regular",Consolas,monospace}
  .article pre{background:#2B2622;color:#F4ECD8;border-radius:12px;padding:15px;overflow-x:auto}
  .article pre code{background:none;border:0;padding:0;color:inherit}
  .article blockquote{border-left:3px solid var(--accent);margin:1em 0;padding:.3em 1em;color:var(--muted);background:var(--accent-soft);border-radius:0 8px 8px 0}
  .article table{border-collapse:collapse;width:100%;font-size:.9rem}
  .article th,.article td{border:1.5px solid var(--line);padding:8px 11px;text-align:left}
  .article th{background:var(--chip)}
  footer{max-width:var(--maxw);margin:0 auto;padding:30px 22px;color:var(--muted);font-size:.82rem;border-top:1.5px solid var(--line)}
</style>
</head>
<body>
<header class="hero">
  <h1>Search · 주제 리서치 갤러리</h1>
  <p class="sub">주제 하나 → 국내·해외 출처를 모아 <b>무환각·인용 기반</b> 보고서. 카드를 누르면 전문이 열립니다. 옵시디언 볼트와 동일한 .md.</p>
  <span class="badge">단일 .md = 진실의 원천 · GitHub Pages</span>
</header>

<div class="controls">
  <input id="q" type="search" placeholder="주제·키워드 검색…" autocomplete="off" />
  <select id="depth" aria-label="깊이 필터" title="깊이 필터"><option value="">전체 깊이</option><option value="quick">QUICK</option><option value="deep">DEEP</option></select>
  <select id="sort" aria-label="정렬" title="정렬"><option value="date">최신순</option><option value="title">제목순</option></select>
</div>
<div id="tagbar"></div>

<main>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" hidden>조건에 맞는 보고서가 없습니다.</div>
</main>

<footer>Search 갤러리 · 보고서는 <code>reports/&lt;slug&gt;/</code> 폴더의 .md 와 <code>comics/</code> 이미지를 그대로 렌더링합니다. 같은 파일이 옵시디언 볼트에도 저장됩니다.</footer>

<div class="overlay" id="overlay"></div>
<section class="sheet" id="sheet" aria-modal="true" role="dialog">
  <div class="bar"><a id="rawlink" href="#" target="_blank" rel="noopener">원문 .md ↗</a><button type="button" class="close" id="closeBtn">닫기 ✕</button></div>
  <article class="article" id="article"></article>
</section>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
const MANIFEST="reports/manifest.json";
let REPORTS=[], activeTag=null;
const $=s=>document.querySelector(s);
const grid=$("#grid"), empty=$("#empty");

async function boot(){
  try{ REPORTS=(await (await fetch(MANIFEST,{cache:"no-store"})).json()).reports||[]; }catch(e){ REPORTS=[]; }
  buildTagbar(); render();
  $("#q").addEventListener("input",render);
  $("#depth").addEventListener("change",render);
  $("#sort").addEventListener("change",render);
  $("#closeBtn").addEventListener("click",closeSheet);
  $("#overlay").addEventListener("click",closeSheet);
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSheet(); });
  if(location.hash.startsWith("#r=")) openBySlug(decodeURIComponent(location.hash.slice(3)));
}
function buildTagbar(){
  const tags=[...new Set(REPORTS.flatMap(r=>r.tags||[]))].sort();
  const bar=$("#tagbar"); bar.innerHTML="";
  tags.forEach(t=>{ const el=document.createElement("span"); el.className="tag"+(t===activeTag?" active":""); el.textContent="#"+t;
    el.onclick=()=>{ activeTag=activeTag===t?null:t; buildTagbar(); render(); }; bar.appendChild(el); });
}
const CAT={"AI에이전트":"#E8743B","오픈소스":"#2FA39B","로컬AI":"#8B6FD6","NousResearch":"#D9A22E","자가발전":"#5BA3D9","함수호출":"#C2582B","주권적AI":"#6BA368"};
const PALETTE=["#E8743B","#2FA39B","#8B6FD6","#D9A22E","#6BA368","#5BA3D9"];
function colorFor(r){ const t=(r.tags||[])[0]; if(t&&CAT[t]) return CAT[t];
  let h=0; const s=(t||r.title||""); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return PALETTE[h%PALETTE.length]; }
function metaHTML(r){ const srcs=r.sources?`· 출처 국내 ${r.sources.kr||0}·해외 ${r.sources.intl||0}`:"";
  return `<span class="depth ${r.depth}">${(r.depth||"").toUpperCase()}</span><span>${r.date||""}</span><span class="src">${srcs}</span>`; }
function tagsHTML(r){ return (r.tags||[]).slice(0,5).map((t,i)=>`<span class="t${i===0?' lead':''}">#${esc(t)}</span>`).join(""); }

function render(){
  const q=$("#q").value.trim().toLowerCase(), depth=$("#depth").value, sort=$("#sort").value;
  let list=REPORTS.filter(r=>{
    if(depth&&r.depth!==depth) return false;
    if(activeTag&&!(r.tags||[]).includes(activeTag)) return false;
    if(q){ const hay=(r.title+" "+(r.tldr||"")+" "+(r.tags||[]).join(" ")).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  list.sort((a,b)=> sort==="title"?a.title.localeCompare(b.title,"ko"):(b.date||"").localeCompare(a.date||""));
  grid.innerHTML=""; empty.hidden=list.length>0;
  const featuredOK = !q && !depth && !activeTag && sort==="date" && list.length>0;
  list.forEach((r,i)=>{
    const color=colorFor(r);
    const c=document.createElement("div");
    c.onclick=()=>openReport(r);
    c.style.setProperty("--strip",color);
    if(featuredOK && i===0){
      c.className="card featured";
      const base=r.path.substring(0,r.path.lastIndexOf("/")+1);
      const cover=r.cover?`<div class="cover"><img src="${base+r.cover}" alt="미리보기" loading="lazy"></div>`:"";
      c.innerHTML=`${cover}<div class="body"><div class="meta">${metaHTML(r)}<span class="pill-feat">FEATURED</span></div><h2>${esc(r.title)}</h2><p class="tldr">${esc(r.tldr||"")}</p><div class="foot">${tagsHTML(r)}</div></div>`;
    } else {
      c.className="card";
      c.innerHTML=`<div class="meta">${metaHTML(r)}</div><h2>${esc(r.title)}</h2><p class="tldr">${esc(r.tldr||"")}</p><div class="foot">${tagsHTML(r)}</div>`;
    }
    grid.appendChild(c);
  });
}
async function openReport(r){
  const path=r.path, base=path.substring(0,path.lastIndexOf("/")+1);
  $("#rawlink").href=path;
  let md=""; try{ md=await (await fetch(path,{cache:"no-store"})).text(); }catch(e){ md="# 불러오기 실패\n\n`"+path+"`"; }
  md=md.replace(/^---[\s\S]*?---\s*/,"");
  $("#article").innerHTML=marked.parse(md);
  // resolve relative image paths against the report folder (idempotent, per-open)
  $("#article").querySelectorAll("img").forEach(im=>{
    const s=im.getAttribute("src")||"";
    if(!/^https?:|^\//.test(s)) im.setAttribute("src", base+s);
    im.addEventListener("click",()=>im.classList.toggle("zoom"));
  });
  openSheet(); location.hash="r="+encodeURIComponent(r.slug);
}
function openBySlug(s){ const r=REPORTS.find(x=>x.slug===s); if(r) openReport(r); }
function openSheet(){ $("#overlay").classList.add("open"); $("#sheet").classList.add("open"); $("#sheet").scrollTop=0; document.body.style.overflow="hidden"; }
function closeSheet(){ $("#overlay").classList.remove("open"); $("#sheet").classList.remove("open"); document.body.style.overflow=""; if(location.hash) history.replaceState(null,"",location.pathname); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
boot();
</script>
</body>
</html>
